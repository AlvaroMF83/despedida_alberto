.label{

flex:1;

flex-direction:column;

.mail-list{

/* MAIL ROW */

.mail-row{
display:grid;
grid-template-columns:30px 30px 220px 1fr 70px;
align-items:center;
gap:8px;
padding:9px 14px;
border-bottom:1px solid #eee;
background:white;
font-size:14px;

}

.mail-row:hover{
background:#f5f5f5;
}

.sender{
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.subject{
display:flex;
gap:6px;
flex-wrap:wrap;
color:#444;
}

.time{
text-align:right;
font-size:13px;
color:#666;
}

.unread .sender{
font-weight:bold;
}

.unread .subject{
font-weight:bold;
}

/* TAGS */

.tag{
padding:2px 6px;
border-radius:4px;
font-size:11px;
font-weight:bold;
}

.blue{background:#1a73e8;color:white;}
.green{background:#1e8e3e;color:white;}
.yellow{background:#fbbc04;color:black;}
.orange{background:#f4511e;color:white;}
.purple{background:#9334e6;color:white;}
.red{background:#d93025;color:white;}

/* EMAIL VIEW */

.email-view{
display:none;
padding:40px;
background:white;
height:100%;
overflow:auto;
}

.back{
color:#1a73e8;

margin-bottom:20px;

font-size:14px;
}

.email-body{

}

.nav{
margin-bottom:20px;
}

.nav button{
margin-right:10px;
}

let currentMail = 0;

/* GENERAR INBOX */

function renderInbox(){

const inbox=document.getElementById("inbox");

mails.forEach((mail,index)=>{

const row=document.createElement("div");

row.className="mail-row unread";

row.innerHTML=`
<div>☐</div>
<div>☆</div>
<div class="sender">${mail.sender}</div>
<div class="subject">
<span class="tag blue">PERSONAL</span>
<span class="tag green">IMPORTANTE</span>
<span class="tag yellow">${mail.tag}</span>
${mail.title}
</div>
<div class="time">Ahora</div>
`;

row.onclick=()=>openMail(index);

inbox.appendChild(row);

});

/* relleno */

fillerMails.forEach(mail=>{

const row=document.createElement("div");
row.className="mail-row";

row.innerHTML=`
<div>☐</div>
<div>☆</div>
<div class="sender">${mail.sender}</div>
<div class="subject">${mail.subject}</div>
<div class="time">${mail.time}</div>
`;

inbox.appendChild(row);

});

}

/* ABRIR MAIL */

function openMail(index){

currentMail=index;

document.getElementById("inbox").style.display="none";
document.getElementById("emailView").style.display="block";

loadMail();

}

function loadMail(){

const mail=mails[currentMail];

document.getElementById("mailTitle").innerText=mail.title;
document.getElementById("mailSender").innerText=mail.sender;
document.getElementById("mailContent").innerHTML=mail.content;

}

function closeMail(){

document.getElementById("emailView").style.display="none";
document.getElementById("inbox").style.display="block";

}

function nextMail(){

if(currentMail < mails.length-1){
currentMail++;
loadMail();
}

}

function prevMail(){

if(currentMail > 0){
currentMail--;
loadMail();
}

}

renderInbox();

</script>
