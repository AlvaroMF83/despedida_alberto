<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Windows</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0b2c8a;
color:white;
height:100vh;
overflow:hidden;
}

/* DESKTOP ICONS */

.desktop{
padding:30px;
display:grid;
grid-template-columns:repeat(6,120px);
gap:25px;
}

.icon{
text-align:center;
cursor:pointer;
}

.icon img{
width:48px;
margin-bottom:6px;
}

/* TASKBAR */

.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#f3f3f3;
display:flex;
align-items:center;
justify-content:center;
gap:18px;
box-shadow:0 -1px 5px rgba(0,0,0,.2);
color:black;
}

.start-btn{
cursor:pointer;
font-size:22px;
}

/* START MENU */

.start-menu{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:500px;
background:white;
color:black;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
display:none;
padding:20px;
}

.start-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.start-icon{
text-align:center;
cursor:pointer;
}

.start-icon img{
width:32px;
}

.recommended{
border-top:1px solid #ddd;
padding-top:15px;
}

.rec-item{
padding:6px;
cursor:pointer;
}

.rec-item:hover{
background:#f1f1f1;
}

/* USER BAR */

.userbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
border-top:1px solid #ddd;
padding-top:10px;
}

/* POWER MENU */

.power-menu{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(150px);
background:white;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
display:none;
}

.power-item{
padding:10px 20px;
cursor:pointer;
}

.power-item:hover{
background:#f2f2f2;
}

/* CLOCK */

.clock{
position:absolute;
right:15px;
font-size:12px;
text-align:right;
}

.bbva{
position:absolute;
right:40px;
bottom:60px;
font-size:90px;
opacity:.6;
}

.power-btn{
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
background:#f0f0f0;
}

.power-btn:hover{
background:#e0e0e0;
}

.power-menu{
position:fixed;
bottom:130px;
left:50%;
transform:translateX(160px);
background:#2b2b2b;
color:white;
border-radius:8px;
box-shadow:0 10px 20px rgba(0,0,0,.5);
display:none;
overflow:hidden;
}

.power-item{
padding:12px 28px;
cursor:pointer;
font-size:14px;
}

.power-item:hover{
background:#3a3a3a;
}

.emoji{
  font-size:40px;
}

</style>

</head>

<body>

<!-- DESKTOP -->

</div>

<script>

function openApp(url){
window.open(url,"_blank")
}

function toggleStart(){
let m=document.getElementById("startMenu")
m.style.display=m.style.display==="block"?"none":"block"
}

function togglePower(){
let p=document.getElementById("powerMenu")
p.style.display=p.style.display==="block"?"none":"block"
}

function shutdown(){
window.close()
}

function lock(){
window.location.href="index.html"
}

function openChrome(){
window.open(
"login1.html",
"chrome",
"width=550,height=700"
)
}

function openGoogle(){
window.open("https://www.google.com", "_blank");
}

function openCCC(){

)

function open3270(){

)
}

</script>

</html>
