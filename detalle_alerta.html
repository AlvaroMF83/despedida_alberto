<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle Alerta</title>

<style>

body{
margin:0;
background:#d9d9d9;
font-family:Segoe UI, Arial;
}

/* ventana */

.window{
width:1100px;
margin:10px auto;
background:#efefef;
border:1px solid #7f9db9;
}

/* barra titulo */

.titlebar{
background:linear-gradient(#d9ecff,#bcd7f5);
height:32px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-size:14px;
border-bottom:1px solid #9cb8d9;
}

.title-left{
display:flex;
align-items:center;
gap:6px;
}

.title-left img{
width:16px;
}

.controls span{
margin-left:10px;
cursor:pointer;
}

/* contenido */

.content{
padding:12px;
font-size:12px;
}

/* botones */

button{
border:1px solid #999;
background:#f4f4f4;
padding:4px 12px;
margin-right:6px;
cursor:pointer;
font-size:12px;
}

/* tabs */

.tabs{
margin:6px 0;
}

.tab{
display:inline-block;
padding:4px 12px;
border:1px solid #999;
border-bottom:none;
background:#f3f3f3;
margin-right:4px;
}

.tab.active{
background:white;
}

/* layout superior */

.top-layout{
display:grid;
grid-template-columns:1fr 220px;
gap:10px;
align-items:start;
}

/* formulario */

.formgrid{
display:grid;
grid-template-columns:120px 220px 120px 220px;
gap:6px 10px;
align-items:center;
}

.input{
background:white;
border:1px solid #999;
padding:3px 6px;
height:22px;
}

/* estado */

.estado-box{
border:1px solid #ccc;
padding:10px;
text-align:center;
background:white;
}

.estado{
color:#0066cc;
font-weight:bold;
font-size:22px;
}

.gears{
font-size:40px;
color:#888;
}

/* secciones */

.section{
border:1px solid #ccc;
padding:10px;
margin-top:10px;
background:#f8f8f8;
}

/* mensaje */

textarea{
width:100%;
height:70px;
border:1px solid #999;
resize:none;
}

/* columnas */

.flex{
display:flex;
gap:20px;
}

.audit{
display:flex;
gap:10px;
}

.audit .input{
width:200px;
}

</style>

</head>
