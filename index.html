<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    margin:0;
    height:100vh;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at center, #0a46c4 0%, #072f8c 60%, #041c4f 100%);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#d6e6ff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:20px;
}

.avatar img{
    width:60px;
}

.username{
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
    margin-bottom:20px;
}

input{
    width:240px;
    padding:10px;
    border:none;
    border-bottom:2px solid white;
    background:transparent;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    margin-top:20px;
    padding:10px 25px;
    font-size:16px;
    border:none;
    background:white;
    color:#0033aa;
    cursor:pointer;
    border-radius:4px;
}

button:hover{
    background:#dfe8ff;
}

.bbva{
    position:fixed;
    bottom:30px;
    right:40px;
    font-size:48px;
    font-weight:bold;
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<div class="avatar">
👤
</div>

<div class="username">
GOMEZ CASTRO, ALBERTO
</div>

<form action="escritorio.html">
<input type="password" placeholder="Contraseña">
<br>
<button type="submit">→</button>
</form>

</div>

<div class="bbva">BBVA</div>

</body>
</html>
